<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EuroMillions Analyzer</title>

<style>
body { font-family: Arial; padding:20px; background:#f8f9fa; }
.balls-row { display:flex; gap:6px; }
.ball {
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:bold;color:#fff;
}
.main { background:#007bff; }
.star { background:#ffc107;color:#000; }
.section { margin-bottom:30px; }
</style>
</head>

<body>

<h2>EuroMillions Analyzer</h2>

<div class="section">
  <button onclick="generateNumbers()">Generate Numbers</button>
  <div id="gen-result"></div>
</div>

<script>

// ── DATA ─────────────────────────────────────────────
let draws = [];

// SAMPLE DATA (replace or load your own)
draws = [
  {date:"2026-04-20",numbers:[1,5,12,23,44],stars:[3,9]},
  {date:"2026-04-17",numbers:[2,11,19,28,50],stars:[1,7]},
  {date:"2026-04-15",numbers:[4,18,21,33,45],stars:[6,10]},
  {date:"2026-04-13",numbers:[3,14,22,37,49],stars:[2,8]},
  {date:"2026-04-10",numbers:[6,9,17,26,41],stars:[4,11]},
  {date:"2026-04-08",numbers:[7,13,25,30,48],stars:[5,12]},
  {date:"2026-04-06",numbers:[8,15,20,29,42],stars:[3,9]},
  {date:"2026-04-03",numbers:[10,16,24,35,47],stars:[1,6]},
  {date:"2026-04-01",numbers:[2,18,27,38,46],stars:[2,10]},
  {date:"2026-03-30",numbers:[5,14,19,32,40],stars:[7,11]}
];

// ── HELPERS ─────────────────────────────────────────
function avg(arr){ return arr.reduce((a,b)=>a+b,0)/arr.length || 0; }
function stdDev(arr){
  const m=avg(arr);
  return Math.sqrt(avg(arr.map(x=>(x-m)**2))) || 0;
}
function pct(a,b){ return b?((a/b)*100).toFixed(1):0; }

function makeBall(n,type){
  const d=document.createElement('div');
  d.className='ball '+type;
  d.textContent=n;
  return d;
}

function getFreqs(){
  const main={},stars={};
  for(let i=1;i<=50;i++) main[i]=0;
  for(let i=1;i<=12;i++) stars[i]=0;

  draws.forEach(d=>{
    d.numbers.forEach(n=>main[n]++);
    d.stars.forEach(s=>stars[s]++);
  });
  return {main,stars};
}

function getRecentFreqs(n){
  const recent = draws.slice(0,n);
  const f={}; for(let i=1;i<=50;i++) f[i]=0;
  recent.forEach(d=>d.numbers.forEach(n=>f[n]++));
  return f;
}

// ── GENERATOR ──────────────────────────────────────
function weightedSampleNoReplace(scores, k) {
  const pool = Object.entries(scores).map(([n,w])=>({n:+n,w}));
  const result = [];

  for(let i=0;i<k;i++){
    const total = pool.reduce((s,x)=>s+x.w,0);
    let r = Math.random()*total, cum=0;

    for(let j=0;j<pool.length;j++){
      cum+=pool[j].w;
      if(r<=cum){
        result.push(pool[j].n);
        pool.splice(j,1);
        break;
      }
    }
  }
  return result;
}

function generateNumbers(){

  const {main,stars} = getFreqs();
  const recent10 = getRecentFreqs(10);
  const n = draws.length;

  const scores={};

  for(let i=1;i<=50;i++){

    const freqScore = main[i]/n;
    const recentScore = recent10[i]/10;

    let dueScore=0;
    const apps=[];
    draws.forEach((d,idx)=>{
      if(d.numbers.includes(i)) apps.push(idx);
    });

    if(apps.length>=2){
      const gaps=[];
      for(let j=1;j<apps.length;j++) gaps.push(apps[j]-apps[j-1]);
      const avgG=avg(gaps);
      const currentGap=apps[0];
      dueScore = avgG ? Math.min(currentGap/avgG,2)/2 : 0;
    }

    scores[i]=freqScore*0.4 + recentScore*0.35 + dueScore*0.25;
  }

  const picked = weightedSampleNoReplace(scores,5).sort((a,b)=>a-b);

  const starScores={};
  for(let s=1;s<=12;s++) starScores[s]=stars[s]/n;

  const pickedStars = weightedSampleNoReplace(starScores,2);

  // DISPLAY
  const el=document.getElementById('gen-result');
  el.innerHTML='';
  const row=document.createElement('div');
  row.className='balls-row';

  picked.forEach(n=>row.appendChild(makeBall(n,'main')));
  pickedStars.forEach(s=>row.appendChild(makeBall(s,'star')));

  el.appendChild(row);
}

</script>

</body>
</html>
